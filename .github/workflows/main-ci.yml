name: Validate Synapse Schema

on:
  pull_request:
    paths:
      - "synapsemod.schema.json"
      - "scripts/register_schema.py"
      - ".github/workflows/main-ci.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip synapseclient

      - name: Validate schema against Synapse registry
        env:
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
        run: python scripts/register_schema.py synapsemod.schema.json
